<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Momentum</title>
</head>
<body>

  <audio src="bensound-thejazzpiano.mp3" autoplay loop controls id="myAudio">오디오 지원되지 않는 브라우저</audio>

  <form id="login-form" class="hidden">
    Hello, stranger.
    <input required maxlength="15" type="text" placeholder="What is your name?">
    <br>
    <button>Enter</button>
  </form>

  <h2 id="clock">00:00:00</h2>
  <h1 id="greeting" class="hidden"></h1>

  <form id="todo-form">
    <input type="text" placeholder="Write a To Do and Press Enter" required>
  </form>
  <ul id="todo-list"></ul>
  <div id="quote-form" class="hidden">
    <form id="feeling-form">
      <p class="upper-feeling">How are you feeling today?</p>
      <select name="feeling-input">
        <option value="excited">😆</option>
        <option value="happy">🙂</option>
        <option value="notbad">😐</option>
        <option value="frustrated">😠</option>
        <option value="sad">😢</option>
      </select>
    </form>
    <span></span>
    <span></span>
  </div>
  <div id="weather">
    <span></span>
    <span></span>
  </div>

  <script src="js/greetings.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/quotes.js"></script>
  <script src="js/background.js"></script>
  <script src="js/todo.js"></script>
  <script src="js/weather.js"></script>
</body>
</html>
